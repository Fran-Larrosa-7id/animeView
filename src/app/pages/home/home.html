<div class="min-h-screen bg-gray-950 text-white">
  <!-- Header -->
  <header class="sticky top-0 z-10 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-6 py-4">
    <h1 class="text-2xl font-bold text-orange-400 tracking-tight">MangaView</h1>
  </header>

  <!-- Biblioteca -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <h2 class="text-sm font-semibold text-gray-500 mb-6 uppercase tracking-widest">Biblioteca</h2>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      @for (manga of mangaList; track manga.id) {
        <a
          [routerLink]="['/manga', manga.id]"
          class="group block rounded-xl overflow-hidden bg-gray-800 shadow-lg transition-all duration-200 hover:ring-2 hover:ring-orange-500 hover:shadow-orange-500/20 focus:outline-none focus-visible:ring-2 focus-visible:ring-orange-400"
          [attr.aria-label]="manga.title + ' – ' + manga.totalChapters + ' capítulos'"
        >
          <div class="relative aspect-2/3 overflow-hidden bg-gray-700">
            <img
              [ngSrc]="manga.coverImage"
              [alt]="manga.title"
              fill
              priority
              class="object-cover transition-transform duration-300 group-hover:scale-105"
            />
          </div>
          <div class="p-2">
            <p class="text-sm font-semibold text-gray-100 truncate">{{ manga.title }}</p>
            <p class="text-xs text-gray-500 mt-0.5">{{ manga.totalChapters }} capítulos</p>
          </div>
        </a>
      }
    </div>
  </main>
</div>
